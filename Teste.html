<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreamento de Sementes</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2d5016;
            --secondary-color: #f5f5f5;
            --text-dark: #333;
            --text-light: #666;
            --border-color: #e0e0e0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --success-green: #1b7d2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-dark);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .search-form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.1);
        }

        .help-text {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 8px;
            line-height: 1.4;
        }

        .search-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            align-self: flex-start;
        }

        .search-btn:hover {
            background-color: #1f4210;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .results-container {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .results-container.visible {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            color: var(--primary-color);
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .card-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--secondary-color);
        }

        .card-item:last-child {
            border-bottom: none;
        }

        .card-label {
            font-weight: 600;
            color: var(--text-light);
        }

        .card-value {
            color: var(--text-dark);
            word-break: break-word;
        }

        .map-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--success-green);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 15px;
        }

        .map-btn:hover {
            background-color: #155a24;
        }

        .map-icon {
            font-size: 1.2rem;
        }

        .alert {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Rastreamento de Sementes</h1>
        </header>

        <form class="search-form" id="searchForm">
            <div class="form-group">
                <label for="loteInput">Número do Lote</label>
                <input 
                    type="text" 
                    id="loteInput" 
                    placeholder="Digite o número do lote"
                    required
                >
            </div>
            <div class="form-group">
                <label for="autenticadorInput">Autenticador</label>
                <input 
                    type="text" 
                    id="autenticadorInput" 
                    placeholder="Digite o autenticador"
                    required
                >
                <div class="help-text">O código autenticador está localizado no rodapé da nota fiscal de aquisição da semente.</div>
            </div>
            <button type="submit" class="search-btn">Rastrear</button>
        </form>

        <div id="resultsContainer" class="results-container">
            <div id="alertMessage"></div>
            <div id="cardsContainer"></div>
        </div>
    </div>

    <script>
        let seedData = [];

        // Função para converter número serial do Excel para data DD/MM/AAAA
        function excelDateToDate(excelSerialDate) {
            const d = new Date((excelSerialDate - 25569) * 86400 * 1000);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // Função para limpar e converter coordenadas para formato Google Maps
        function parseCoordinates(coord) {
            if (!coord) return null;
            let text = coord.trim();
            text = text.replace(/,/g, '.').replace(/["“”]/g, '').replace(/[’′]/g, '');

            // Tenta converter coordenadas DMS como "S 13°06'52.6"" ou "W 45°53'36.5""
            const dmsMatch = text.match(/^([NSWE])\s*([0-9]{1,3})\D+([0-9]{1,2})\D+([0-9]{1,2}(?:\.\d+)?)$/i);
            if (dmsMatch) {
                const direction = dmsMatch[1].toUpperCase();
                const degrees = parseFloat(dmsMatch[2]);
                const minutes = parseFloat(dmsMatch[3]);
                const seconds = parseFloat(dmsMatch[4]);
                let value = degrees + (minutes / 60) + (seconds / 3600);
                if (direction === 'S' || direction === 'W') value = -value;
                return value.toFixed(8);
            }

            // Se já estiver em decimal, só ajusta o sinal caso tenha S/W
            const decimalMatch = text.match(/^([NSWE])\s*([+-]?\d+(?:\.\d+)?)$/i);
            if (decimalMatch) {
                const direction = decimalMatch[1].toUpperCase();
                let value = parseFloat(decimalMatch[2]);
                if (direction === 'S' || direction === 'W') value = -Math.abs(value);
                return value.toString();
            }

            return text;
        }

        // Função para gerar URL do Google Maps
        function getGoogleMapsUrl(latitude, longitude) {
            const lat = parseCoordinates(latitude);
            const lon = parseCoordinates(longitude);
            if (!lat || !lon) return null;
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat)},${encodeURIComponent(lon)}`;
        }

        // Carregar CSV ao iniciar
        function loadCSV() {
            fetch('LOTES SOJA25-261.csv')
                .then(response => response.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        delimiter: ';',
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            seedData = results.data;
                            console.log('Dados carregados:', seedData.length, 'registros');
                        },
                        error: function(error) {
                            console.error('Erro ao carregar CSV:', error);
                            showAlert('Erro ao carregar dados do arquivo CSV.');
                        }
                    });
                })
                .catch(error => {
                    console.error('Erro na requisição:', error);
                    showAlert('Erro ao conectar ao arquivo CSV. Verifique se o arquivo está na pasta raiz.');
                });
        }

        // Buscar registro no CSV
        function searchRecord(lote, autenticador) {
            const record = seedData.find(item => 
                item['LOTE']?.trim().toUpperCase() === lote.trim().toUpperCase() &&
                item['AUTENTICADOR']?.trim().toUpperCase() === autenticador.trim().toUpperCase()
            );
            return record || null;
        }

        // Exibir alerta
        function showAlert(message) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.innerHTML = `<div class="alert">${message}</div>`;
        }

        // Renderizar cards de resultado
        function renderResults(record) {
            const container = document.getElementById('cardsContainer');
            
            // Converter data
            const dataFormatada = record['DATA DO BENEFIAMENTO'] ? 
                excelDateToDate(parseFloat(record['DATA DO BENEFIAMENTO'])) : 'N/A';

            // Gerar URL do mapa
            const mapsUrl = getGoogleMapsUrl(record['LATITUDE'], record['LONGITUDE']);

            const html = `
                <!-- Card 1: Identificação do Lote -->
                <div class="card">
                    <h2>Identificação do Lote</h2>
                    <div class="card-item">
                        <span class="card-label">Número do Lote:</span>
                        <span class="card-value">${record['LOTE'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Variedade:</span>
                        <span class="card-value">${record['VARIEDADE'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Categoria:</span>
                        <span class="card-value">${record['CATEGORIA'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Peneira:</span>
                        <span class="card-value">${record['PENEIRA'] || 'N/A'}</span>
                    </div>
                </div>

                <!-- Card 2: Informações do Produtor -->
                <div class="card">
                    <h2>Informações do Produtor</h2>
                    <div class="card-item">
                        <span class="card-label">Produtor:</span>
                        <span class="card-value">${record['PRODUTOR'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Renasem:</span>
                        <span class="card-value">${record['RENASEM PRODUTOR'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Cooperado:</span>
                        <span class="card-value">${record['COOPERADO'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Fazenda:</span>
                        <span class="card-value">${record['FAZENDA'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Talhão:</span>
                        <span class="card-value">${record['TALHÃO'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Nº Campo:</span>
                        <span class="card-value">${record['Nº CAMPO'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Coordenadas:</span>
                        <span class="card-value">${record['LATITUDE'] || 'N/A'} / ${record['LONGITUDE'] || 'N/A'}</span>
                    </div>
                    ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" class="map-btn"><span class="map-icon">📍</span> Ver no Google Maps</a>` : ''}
                </div>

                <!-- Card 3: Dados da Produção -->
                <div class="card">
                    <h2>Dados da Produção</h2>
                    <div class="card-item">
                        <span class="card-label">Data do Beneficiamento:</span>
                        <span class="card-value">${dataFormatada}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">PMS:</span>
                        <span class="card-value">${record['PMS         Sementec'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Peso do Bag (kg):</span>
                        <span class="card-value">${record['PESO DO BAG'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Quantidade de Bags:</span>
                        <span class="card-value">${record['QUANTIDADE  DE BAGS'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Peso Total do Lote (kg):</span>
                        <span class="card-value">${record['TOTAL'] || 'N/A'}</span>
                    </div>
                </div>

                <!-- Card 4: Dados de Qualidade -->
                <div class="card">
                    <h2>Dados de Qualidade da Semente</h2>
                    <div class="card-item">
                        <span class="card-label">Umidade (%):</span>
                        <span class="card-value">${record['UMIDADE'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Vigor (%):</span>
                        <span class="card-value">${record['TZ SEMENTEC VIGOR%'] || 'N/A'}</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">Germinação (%):</span>
                        <span class="card-value">${record['TZ SEMENTEC GERMINAÇÃO%'] || 'N/A'}</span>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // Event listener para o formulário
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const lote = document.getElementById('loteInput').value;
            const autenticador = document.getElementById('autenticadorInput').value;

            if (!lote || !autenticador) {
                showAlert('Por favor, preencha ambos os campos.');
                return;
            }

            const record = searchRecord(lote, autenticador);

            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('visible');

            if (record) {
                document.getElementById('alertMessage').innerHTML = '';
                renderResults(record);
            } else {
                showAlert('Lote ou Autenticador não encontrados');
                document.getElementById('cardsContainer').innerHTML = '';
            }
        });

        // Carregar dados ao abrir a página
        loadCSV();
    </script>
</body>
</html>
